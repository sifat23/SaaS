services:

  # Laravel application setup code
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: saas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      APP_ENV: local
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
    depends_on:
      - db
      - redis
    networks:
      - saas

  # Nginx setup code
  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
     - saas

  # Node setup code
  node:
    image: node:20-alpine
    container_name: saas_node
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - ./node_modules:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - saas

  # DB setup code
  db:
    image: mariadb:11.4
    container_name: saas_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-saas}
      MYSQL_USER: ${DB_USErNAME:-saas}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - saas

  # Manage the GUI for database
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: saas_phpmyadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      - db
    networks:
      - saas

  # Redis setup code
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - saas
    
  # Laravel queue setup code
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: saas_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      - app
      - redis
      - db
    networks:
      - saas

  # Laravel scheduler setup code
  scheduler:
      build:
        context: .
        dockerfile: docker/php/Dockerfile
        args:
          UID: ${UID:-1000}
          GID: ${GID:-1000}
      container_name: saas_scheduler
      restart: unless-stopped
      working_dir: /var/www/html
      volumes:
        - ./:/var/www/html
      command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
      depends_on:
        - app
        - db
        - redis
      networks:
        - saas

  # Mailpit setup code (Local mailing system)
  mailpit:
    image: axllent/mailpit:latest
    container_name: saas_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - saas

  #Stripe CLI setup for payment and subscription
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: saas_stripe_cli
    profiles: ["stripe"]
    command: listen --forward-to http://nginx/stripe/webhook
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET}
    depends_on:
      - nginx
    networks:
      - saas

networks:
  saas:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  node_modules: